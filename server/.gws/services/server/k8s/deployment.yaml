apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  labels:
    app: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
      - name: server
        image: server
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "5000"
        - name: NODE_ENV
          value: "development"
        - name: MONGODB_URI
          value: "mongodb://devuser:devpassword@mongodb:27017/devdb"
        - name: JWT_EXPIRES_IN
          value: "7d"
        - name: CLIENT_URL
          value: "https://client.mern-stack.local.getwebstack.dev:9443"
      restartPolicy: Always
